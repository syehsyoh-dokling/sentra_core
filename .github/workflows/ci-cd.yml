name: Sentracore APP1 Core CI/CD

on:
  push:
    branches: [main, master, staging]
  pull_request:
    branches: [main, master, staging]
  workflow_dispatch:

concurrency:
  group: sentracore-app1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Rust Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace

  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APP1 services
        run: docker compose build

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        shell: bash
        run: |
          test -n "${{ secrets.APP1_SSH_HOST }}"
          test -n "${{ secrets.APP1_SSH_USER }}"
          test -n "${{ secrets.APP1_SSH_KEY }}"
          test -n "${{ secrets.APP1_DEPLOY_PATH }}"

      - name: Install SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.APP1_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.APP1_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to server
        shell: bash
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "target" \
            --exclude ".env" \
            --exclude "storage" \
            ./ "${{ secrets.APP1_SSH_USER }}@${{ secrets.APP1_SSH_HOST }}:${{ secrets.APP1_DEPLOY_PATH }}/"

      - name: Write server env
        shell: bash
        run: |
          ssh "${{ secrets.APP1_SSH_USER }}@${{ secrets.APP1_SSH_HOST }}" "cat > '${{ secrets.APP1_DEPLOY_PATH }}/.env' <<'EOF'
          APP_NAME=sentracore-core-backend
          APP_PORT=4000
          DATABASE_URL=${{ secrets.APP1_DATABASE_URL }}
          POSTGRES_DB=${{ secrets.APP1_POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.APP1_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.APP1_POSTGRES_PASSWORD }}
          REDIS_URL=${{ secrets.APP1_REDIS_URL }}
          JWT_SECRET=${{ secrets.APP1_JWT_SECRET }}
          APP2_BASE_URL=${{ secrets.APP2_BACKEND_API_URL }}
          MIDTRANS_BASE_URL=${{ secrets.MIDTRANS_BASE_URL }}
          SUMSUB_BASE_URL=${{ secrets.SUMSUB_BASE_URL }}
          POLYGON_RPC_URL=${{ secrets.POLYGON_RPC_URL }}
          RESEND_BASE_URL=${{ secrets.RESEND_BASE_URL }}
          META_GRAPH_BASE_URL=${{ secrets.META_GRAPH_BASE_URL }}
          MOCK_EXTERNAL_API=false
          EOF"

      - name: Start APP1 on server
        shell: bash
        run: |
          ssh "${{ secrets.APP1_SSH_USER }}@${{ secrets.APP1_SSH_HOST }}" \
            "cd '${{ secrets.APP1_DEPLOY_PATH }}' && docker compose --env-file .env up -d --build"
